name: Blender Smoke Test

# bpy(約370MB) を使う重いジョブなので、生成系コードが変わった時と手動実行に限定する
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/**"
      - "config/**"
      - ".github/workflows/blender-smoke.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-blender.txt

      - name: Install Blender as a Python module (pinned)
        run: pip install -r requirements-blender.txt

      - name: End-to-end smoke (generate -> validate -> learn 3 iters)
        run: |
          python scripts/learn/optimizer.py -- \
            --asset assets/characters/goblin-warrior --iters 3 --seed 0

      - name: Validate produced blend through the safe loader
        run: |
          python scripts/checks/validate_mesh.py -- \
            --blend assets/characters/goblin-warrior/highpoly/base.blend \
            --type npc_character
