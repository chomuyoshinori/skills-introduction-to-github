name: Validate Assets

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate asset metadata against standards
        run: python scripts/checks/validate_assets.py

      - name: Syntax-check Blender scripts
        run: python -m compileall scripts
