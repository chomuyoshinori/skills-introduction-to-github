name: Validate Assets

on:
  push:
    branches: [main]
  pull_request:

# 検査のみのワークフローなのでトークンは読み取り専用に絞る
permissions:
  contents: read

# 同じブランチの古い実行はキャンセルして CI 資源を節約
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install pinned dependencies
        run: pip install -r requirements-ci.txt

      - name: Validate asset metadata against standards
        run: python scripts/checks/validate_assets.py

      - name: Syntax-check Blender scripts
        run: python -m compileall scripts

      - name: Unit tests (learning/scoring/anatomy, no bpy)
        run: python -m pytest tests/ -q
