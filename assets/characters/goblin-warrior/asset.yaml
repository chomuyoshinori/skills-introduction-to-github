name: goblin-warrior
display_name: "Goblin Warrior"
type: npc_character
prefix: CHR_goblin
height_m: 1.3
status: blocking
notes: |
  コミカルで小柄なゴブリンの戦士。前傾姿勢、大きめの頭と手。
  寄りで見せないモブ想定なので npc_character 予算(25k tris)で作る。

# 解剖学検査(config/anatomy.yaml)に使う種。human | quadruped_canine
species: human

# 学習ループ(scripts/learn/optimizer.py)が目指すプロポーション/ポーズ目標。
# 実現値とこの目標との誤差が小さいほど高スコア。
target:
  height_m: 1.3
  head_ratio: 0.26      # 大きめの頭（ゴブリンらしさ）
  torso_ratio: 0.34
  leg_ratio: 0.38       # 短めの脚
  arm_ratio: 0.42       # 長めの腕
  shoulder_w: 0.22
  # ポーズ目標（度）。戦闘待機: 前傾し膝を緩め、肘を曲げて構える
  lean_deg: 14
  hip_pitch_deg: 12
  knee_bend_deg: 20
  shoulder_pitch_deg: 20
  elbow_bend_deg: 55
