# 関節の解剖学知識ベース（可動域 ROM: Range of Motion）
# 値は度(deg)。ブロッキング用途の概略値であり、医学的厳密値ではない。
# scripts/lib/anatomy.py がこれを読み、ポーズの解剖学的妥当性を検査する。
# 学習ループ(scripts/learn/)はこの範囲を「知らない」状態から試行錯誤で獲得する。

human:
  joints:
    spine_pitch:           # 体幹の前後屈
      type: ball_socket
      min_deg: -30         # 後屈
      max_deg: 45          # 前屈
    hip_pitch:             # 股関節の屈曲(+)/伸展(-)
      type: ball_socket
      min_deg: -20
      max_deg: 120
    knee:                  # 膝の屈曲。蝶番関節。マイナス=過伸展(逆関節)は不可
      type: hinge
      min_deg: 0
      max_deg: 150
    shoulder_pitch:        # 肩の屈曲(+前方挙上)/伸展(-後方)
      type: ball_socket
      min_deg: -60
      max_deg: 180
    elbow:                 # 肘の屈曲。蝶番関節。逆関節不可
      type: hinge
      min_deg: 0
      max_deg: 145

# 四足動物（イヌ科の概略値）。後肢は stifle(膝) と hock(飛節) を持ち、
# 完全には伸びきらない（min_deg > 0）のが人間との大きな違い。
quadruped_canine:
  joints:
    spine_pitch:
      type: ball_socket
      min_deg: -20
      max_deg: 30
    hip_pitch:
      type: ball_socket
      min_deg: -30
      max_deg: 110
    stifle:                # 後肢の膝。常に屈曲位
      type: hinge
      min_deg: 20
      max_deg: 130
    hock:                  # 飛節（かかと相当）。逆向きに曲がって見える部位
      type: hinge
      min_deg: 30
      max_deg: 140
    shoulder_pitch:
      type: ball_socket
      min_deg: -40
      max_deg: 160
    elbow:
      type: hinge
      min_deg: 20
      max_deg: 150
